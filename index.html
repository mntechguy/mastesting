<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Stick Life</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#222;color:#ddd;font-family:'Courier New',monospace;overflow:hidden;height:100vh;height:100dvh;user-select:none;-webkit-user-select:none;touch-action:none}
#root{display:flex;flex-direction:column;height:100vh;height:100dvh}

.hud{display:flex;align-items:center;padding:4px 8px;background:#111;gap:6px;flex-shrink:0;z-index:10;flex-wrap:wrap}
.hud-day{color:#fff;font-size:.7em;font-weight:bold;background:#1a1a2e;padding:2px 6px;border-radius:3px}
.hp-wrap{display:flex;align-items:center;gap:3px}
.hp-icon{color:#e94560;font-size:.8em}
.hp-bar-out{width:70px;height:10px;background:#333;border-radius:5px;overflow:hidden;position:relative}
.hp-bar-in{height:100%;border-radius:5px;transition:width .3s}
.hp-text{font-size:.55em;color:#fff;position:absolute;width:100%;text-align:center;top:0;line-height:10px;font-weight:bold;text-shadow:0 0 2px #000}
.hud-cash{color:#4ecca3;font-size:.75em;font-weight:bold}
.hud-stat{font-size:.6em;padding:1px 5px;background:#1a1a2e;border-radius:3px}
.hud-stat .hl{color:#666}.hud-stat .hv{font-weight:bold}
.hs-str{color:#fc5185}.hs-int{color:#6c63ff}.hs-chm{color:#f9a826}.hs-k{color:#a8e6cf}
.hud-slots{display:flex;gap:2px;align-items:center}
.hud-pip{width:8px;height:8px;border-radius:50%;border:1.5px solid #555}
.hud-pip.u{background:#e94560;border-color:#e94560}
.hud-pip.f{background:#4ecca3;border-color:#4ecca3}

.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Bottom sheet */
.bsheet-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:20}
.bsheet{position:absolute;bottom:0;left:0;right:0;background:#1a1a2e;border-top:2px solid #e94560;border-radius:16px 16px 0 0;z-index:21;max-height:55%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 12px}
.bsheet-handle{width:40px;height:4px;background:#555;border-radius:2px;margin:8px auto}
.bsheet h3{color:#e94560;font-size:.9em;padding:4px 14px 2px}
.bsheet .bdesc{color:#666;font-size:.65em;padding:0 14px 8px}
.bsheet-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#888;font-size:1.2em;cursor:pointer;font-family:inherit}
.bsheet-actions{padding:0 10px}

.act-btn{display:block;width:100%;margin:5px 0;padding:11px 12px;background:#0f3460;border:1px solid #333;color:#ddd;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.78em;text-align:left;position:relative}
.act-btn:active{background:#e94560}
.act-btn:disabled{opacity:.3;pointer-events:none}
.act-btn .ab-name{font-weight:bold;margin-bottom:1px}
.act-btn .ab-sub{color:#888;font-size:.85em}
.act-btn .ab-cost{position:absolute;top:11px;right:12px;color:#4ecca3;font-size:.85em}
.act-btn .ab-req{color:#e94560;font-size:.8em;margin-top:2px}

.job-row{display:flex;justify-content:space-between;padding:6px 12px;font-size:.7em;border-bottom:1px solid #111;cursor:pointer}
.job-row:active{background:#0f3460}
.job-row.locked{opacity:.3;pointer-events:none}
.job-row.current{background:#0f3460;border-radius:4px}
.job-row .jn{color:#ddd}.job-row .jr{color:#666}.job-row .jp{color:#4ecca3}

.shop-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #111;cursor:pointer}
.shop-row:active{background:#0f3460}
.shop-row.dis{opacity:.3;pointer-events:none}
.shop-row .sn{color:#ddd;font-size:.78em;font-weight:bold}
.shop-row .sd{color:#666;font-size:.62em}
.shop-row .sp{color:#f9a826;font-size:.78em;font-weight:bold;white-space:nowrap}

.end-day-float{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:15;padding:10px 24px;background:rgba(26,26,46,.9);border:1px solid #f9a826;color:#f9a826;border-radius:20px;font-family:inherit;font-size:.75em;cursor:pointer;backdrop-filter:blur(4px)}
.end-day-float:active{background:#f9a82633}

/* Log toast */
.log-toast{position:absolute;top:4px;left:50%;transform:translateX(-50%);z-index:15;padding:4px 12px;border-radius:12px;font-size:.65em;pointer-events:none;text-align:center;max-width:80%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:toastIn .3s ease}
.log-toast.good{background:rgba(78,204,163,.2);color:#4ecca3;border:1px solid #4ecca344}
.log-toast.bad{background:rgba(233,69,96,.2);color:#e94560;border:1px solid #e9456044}
.log-toast.event{background:rgba(249,168,38,.2);color:#f9a826;border:1px solid #f9a82644}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#1a1a2e;border:2px solid #e94560;border-radius:12px;padding:16px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h2{color:#e94560;font-size:.95em;margin-bottom:6px}
.modal p{font-size:.78em;line-height:1.4;margin-bottom:6px;color:#ccc}
.mbtn{display:block;width:100%;margin:5px 0;padding:11px;background:#0f3460;border:1px solid #333;color:#ddd;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.78em;text-align:left}
.mbtn:active{background:#e94560}
.mbtn:disabled{opacity:.3;pointer-events:none}

.summ{text-align:center}
.summ h2{font-size:1.3em;margin-bottom:8px}
.summ .fs{font-size:.85em;margin:3px 0}
.summ .al{font-size:1em;color:#f9a826;margin:6px 0}
.summ .sc{font-size:1.2em;color:#e94560;margin:8px 0}

.wager-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.wager-btn{padding:4px 8px;font-size:.65em;background:#0f3460;border:1px solid #333;color:#ddd;border-radius:4px;cursor:pointer;font-family:inherit}
.wager-btn.active{background:#e94560}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect} = React;

// ===== WORLD CONSTANTS =====
const W = 1200, H = 800;
const BUILDINGS = [
  {id:"apartment",label:"Apartment",x:60,y:460,w:140,h:110,color:"#4a6a7a",roof:"#3a5060",door:{x:130,y:540,w:20,h:30}},
  {id:"university",label:"University",x:480,y:80,w:180,h:120,color:"#5a4a7a",roof:"#4a3a6a",door:{x:570,y:170,w:22,h:32}},
  {id:"gym",label:"Gym",x:900,y:460,w:140,h:100,color:"#7a4a4a",roof:"#6a3a3a",door:{x:970,y:530,w:20,h:30}},
  {id:"bar",label:"The Rusty Nail",x:480,y:560,w:160,h:100,color:"#7a6a3a",roof:"#6a5a2a",door:{x:560,y:630,w:20,h:30}},
  {id:"workplace",label:"Workplace",x:900,y:80,w:160,h:110,color:"#3a7a4a",roof:"#2a6a3a",door:{x:980,y:160,w:20,h:30}},
  {id:"store",label:"Quick-E-Mart",x:60,y:80,w:150,h:100,color:"#6a7a3a",roof:"#5a6a2a",door:{x:135,y:150,w:20,h:30}},
];

// ===== GAME DATA =====
const JOBS=[
  {id:"panhandler",name:"Panhandler",pay:5,req:{},desc:"'Anything helps'. It doesn't."},
  {id:"dishwasher",name:"Dishwasher",pay:15,req:{intelligence:5},desc:"Sisyphus had it easier."},
  {id:"clerk",name:"Store Clerk",pay:25,req:{intelligence:15},desc:"Guarding snacks."},
  {id:"bouncer",name:"Bouncer",pay:45,req:{strength:30},desc:"Judge of the door."},
  {id:"juniordev",name:"Jr. Developer",pay:80,req:{intelligence:50},desc:"Stack Overflow boss."},
  {id:"sales",name:"Sales Director",pay:120,req:{charm:50,intelligence:30},desc:"Selling your soul."},
  {id:"executive",name:"Executive",pay:200,req:{intelligence:80,charm:50},desc:"Meetings about meetings."},
  {id:"crimeboss",name:"Crime Boss",pay:150,req:{strength:40,karmaCap:-40},desc:"Morally bankrupt.",karmaShift:-2},
  {id:"philanthropist",name:"Philanthropist",pay:50,req:{charm:60,karmaFloor:60},desc:"Saving the world.",karmaShift:2},
];
function canDoJob(j,s){for(const[k,v]of Object.entries(j.req)){if(k==="karmaCap"&&s.karma>v)return false;if(k==="karmaFloor"&&s.karma<v)return false;if(k!=="karmaCap"&&k!=="karmaFloor"&&(s[k]||0)<v)return false}return true}

const ITEMS=[
  {id:"energy_drink",name:"Energy Drink",cost:5,desc:"+10 HP",consumable:true,effect:{hp:10}},
  {id:"cheap_smokes",name:"Cheap Smokes",cost:3,desc:"+1 CHM -3 HP",consumable:true,effect:{charm:1,hp:-3}},
  {id:"laptop",name:"Laptop",cost:200,desc:"+5 INT",oneTime:true,effect:{intelligence:5}},
  {id:"dumbbells",name:"Dumbbells",cost:150,desc:"+5 STR",oneTime:true,effect:{strength:5}},
  {id:"nice_clothes",name:"Nice Clothes",cost:100,desc:"+5 CHM",oneTime:true,effect:{charm:5}},
  {id:"alarm_clock",name:"Alarm Clock",cost:50,desc:"Block oversleep",oneTime:true},
  {id:"skateboard",name:"Skateboard",cost:75,desc:"+speed +50 score",oneTime:true},
  {id:"penthouse_key",name:"Penthouse Key",cost:5000,desc:"+500 score",oneTime:true},
];

const EVENTS=[
  {title:"Mugging",desc:"Someone's getting mugged in the alley.",choices:[
    {label:"Intervene (STR 20)",req:{strength:20},effects:()=>({karma:5,hp:Math.random()<.2?-10:0}),result:e=>`Stepped in.${e.hp<0?' -10 HP.':''} +5 Karma.`,type:"good"},
    {label:"Walk away",effects:()=>({karma:-3}),result:()=>"-3 Karma.",type:"bad"},
    {label:"Call cops",effects:()=>({karma:1}),result:()=>"+1 Karma. Minimal effort.",type:"event"},
  ]},
  {title:"Found Wallet",desc:"$50 inside plus an ID.",choices:[
    {label:"Keep it",effects:()=>({cash:50,karma:-5}),result:()=>"+$50. -5 Karma.",type:"bad"},
    {label:"Return it",effects:()=>({karma:3,charm:2,cash:10}),result:()=>"+$10 reward. +3K +2C.",type:"good"},
  ]},
  {title:"Bar Fight",desc:"Bottles fly. Chair incoming.",choices:[
    {label:"Fight (STR 15)",req:{strength:15},effects:s=>s.strength>=15?{strength:2}:{hp:-15},result:s=>s.strength>=15?"+2 STR.":"-15 HP. Ouch.",type:"event"},
    {label:"Run",effects:()=>({charm:-1}),result:()=>"-1 CHM. Dignity gone.",type:"bad"},
  ]},
  {title:"Job Offer",desc:"Tracksuit man has 'work' for you.",choices:[
    {label:"Accept (STR 40)",req:{strength:40},effects:()=>({karma:-5}),result:()=>"Crime Boss unlocked. -5K.",type:"event"},
    {label:"Decline",effects:()=>({}),result:()=>"Wise. Probably.",type:"event"},
  ]},
  {title:"Overslept",desc:"No alarm went off.",choices:[
    {label:"Lose 1 slot",effects:()=>({slotPenalty:1}),result:()=>"-1 slot. Buy an alarm clock.",type:"bad",blockItem:"alarm_clock"},
  ]},
  {title:"Lucky Day",desc:"$20 on the ground. Nobody around.",choices:[
    {label:"Take it",effects:()=>({cash:20}),result:()=>"+$20.",type:"good"},
  ]},
  {title:"Charity Drive",desc:"Volunteers want your money.",choices:[
    {label:"Donate $50",req:{cash:50},effects:()=>({cash:-50,karma:5,charm:2}),result:()=>"-$50 +5K +2C.",type:"good"},
    {label:"Ignore",effects:()=>({}),result:()=>"They judge you.",type:"event"},
    {label:"Steal",req:{karmaBelow:0},effects:()=>({cash:30,karma:-10}),result:()=>"+$30 -10K. New low.",type:"bad"},
  ]},
  {title:"Food Poisoning",desc:"Gas station sushi. Mistake.",choices:[
    {label:"Suffer",effects:()=>({hp:-10}),result:()=>"-10 HP.",type:"bad"},
  ]},
];

const NPCS=[
  {name:"Bartender Dave",reqChm:0,lines:["'First one's free.'"]},
  {name:"Regular Pete",reqChm:10,lines:["'Don't take bar advice.'"]},
  {name:"Mysterious Woman",reqChm:25,lines:["'You're interesting.'"]},
  {name:"Shady Tony",reqChm:5,reqKarma:-10,lines:["'You get things done.'"]},
  {name:"Father Marcus",reqChm:15,reqKarma:15,lines:["'Kind heart.'"]},
];

// ===== DRAWING =====
function drawWorld(ctx,tod,buildings,playerPos,playerFacing,frame,moving,hasSkateboard,enteredId,nearId){
  // Sky
  const skyColors={morning:['#2a3050','#3a4060'],midday:['#2a3050','#3a4570'],afternoon:['#1a2040','#2a3050'],evening:['#0e1525','#1a2040'],night:['#080c18','#0e1525']};
  const sc=skyColors[tod]||skyColors.morning;
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,sc[0]); g.addColorStop(1,sc[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars at night/evening
  if(tod==='night'||tod==='evening'){ctx.fillStyle='#ffffff18';for(let i=0;i<60;i++){ctx.fillRect((i*173)%W,(i*97)%(H*.3),1.5,1.5)}}

  // Ground
  ctx.fillStyle='#2a3a2a'; ctx.fillRect(0,H*.85,W,H*.15);

  // Roads - H
  const ry=H*.52;
  ctx.fillStyle='#3a3a3a'; ctx.fillRect(0,ry,W,60);
  ctx.fillStyle='#444'; ctx.fillRect(0,ry-4,W,4); ctx.fillRect(0,ry+60,W,4);
  // Dashes
  ctx.strokeStyle='#f9a82644'; ctx.lineWidth=2; ctx.setLineDash([20,14]);
  ctx.beginPath(); ctx.moveTo(0,ry+30); ctx.lineTo(W,ry+30); ctx.stroke(); ctx.setLineDash([]);

  // Roads - V
  const rx=W*.42;
  ctx.fillStyle='#3a3a3a'; ctx.fillRect(rx,0,60,H);
  ctx.fillStyle='#444'; ctx.fillRect(rx-4,0,4,H); ctx.fillRect(rx+60,0,4,H);
  ctx.strokeStyle='#f9a82644'; ctx.setLineDash([20,14]);
  ctx.beginPath(); ctx.moveTo(rx+30,0); ctx.lineTo(rx+30,H); ctx.stroke(); ctx.setLineDash([]);

  // Sidewalks
  ctx.fillStyle='#4a4a4a';
  ctx.fillRect(0,ry-10,W,6); ctx.fillRect(0,ry+64,W,6);
  ctx.fillRect(rx-10,0,6,H); ctx.fillRect(rx+64,0,6,H);

  // Crosswalks
  ctx.fillStyle='#f9a82633';
  for(let i=0;i<4;i++){ctx.fillRect(rx+5+i*14,ry,8,60)}
  for(let i=0;i<4;i++){ctx.fillRect(rx,ry+5+i*14,60,8)}

  // Lamp posts
  for(let lx of [250,750,250,750]){
    const ly=lx<500?ry-10:ry+70;
    ctx.strokeStyle='#555'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx,ly-35); ctx.stroke();
    ctx.fillStyle=tod==='night'?'#f9a82866':'#f9a82833';
    ctx.beginPath(); ctx.arc(lx,ly-38,5,0,Math.PI*2); ctx.fill();
    if(tod==='night'){
      const lg=ctx.createRadialGradient(lx,ly-38,0,lx,ly-38,50);
      lg.addColorStop(0,'rgba(249,168,38,0.08)'); lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg; ctx.fillRect(lx-50,ly-88,100,100);
    }
  }

  // Parked car
  ctx.fillStyle='#e94560'; ctx.fillRect(rx+10,ry-70,40,25);
  ctx.fillStyle='#c0354e'; ctx.fillRect(rx+15,ry-75,30,15);
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(rx+18,ry-43,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rx+42,ry-43,5,0,Math.PI*2); ctx.fill();

  // Buildings
  for(const b of buildings){
    const near=nearId===b.id;
    const entered=enteredId===b.id;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(b.x+5,b.y+5,b.w,b.h);
    // Glow
    if(near||entered){ctx.fillStyle=entered?'rgba(233,69,96,.12)':'rgba(78,204,163,.08)';ctx.fillRect(b.x-6,b.y-6,b.w+12,b.h+12)}
    // Body
    ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h);
    // Roof
    ctx.fillStyle=b.roof;
    ctx.beginPath(); ctx.moveTo(b.x-8,b.y); ctx.lineTo(b.x+b.w/2,b.y-25); ctx.lineTo(b.x+b.w+8,b.y); ctx.closePath(); ctx.fill();
    // Windows
    const wc=entered?'#f9a82688':'#f9a82644';
    ctx.fillStyle=wc;
    const rows=Math.floor(b.h/35);
    const cols=Math.floor(b.w/35);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      const wx=b.x+15+c*35,wy=b.y+12+r*35;
      if(Math.abs(wx-b.door.x)<15&&Math.abs(wy-b.door.y)<15) continue;
      ctx.fillRect(wx,wy,14,12);
      ctx.strokeStyle='#00000044'; ctx.lineWidth=1;
      ctx.strokeRect(wx,wy,14,12);
      ctx.beginPath(); ctx.moveTo(wx+7,wy); ctx.lineTo(wx+7,wy+12); ctx.stroke();
    }
    // Door
    ctx.fillStyle=entered?'#f9a826':'#2a1a0a';
    ctx.fillRect(b.door.x,b.door.y,b.door.w,b.door.h);
    ctx.fillStyle='#f9a826'; ctx.beginPath(); ctx.arc(b.door.x+b.door.w-4,b.door.y+b.door.h/2,2,0,Math.PI*2); ctx.fill();

    // Label
    ctx.fillStyle=near?'#fff':'#bbb'; ctx.font=`${near?'bold ':''}11px monospace`; ctx.textAlign='center';
    ctx.fillText(b.label,b.x+b.w/2,b.y+b.h+16);
    if(near&&!entered){ctx.fillStyle='#4ecca3';ctx.font='bold 10px monospace';ctx.fillText('TAP DOOR',b.x+b.w/2,b.y+b.h+28)}
  }

  // Player
  drawStick(ctx,playerPos.x,playerPos.y,playerFacing,frame,moving,hasSkateboard);
}

function drawStick(ctx,x,y,face,frame,moving,board){
  ctx.save(); ctx.translate(x,y); ctx.scale(face==='left'?-1:1,1);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(0,26,10,4,0,0,Math.PI*2); ctx.fill();
  const w=moving?Math.sin(frame*.18)*.35:0;
  ctx.strokeStyle='#eee'; ctx.lineWidth=2.5; ctx.lineCap='round';
  // Body
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(0,10); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(-6,24+w*5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(6,24-w*5); ctx.stroke();
  // Arms
  ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(-8,8-w*4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(8,8+w*4); ctx.stroke();
  // Head
  ctx.fillStyle='#eee'; ctx.beginPath(); ctx.arc(0,-17,7,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(3,-18,1.5,0,Math.PI*2); ctx.fill();
  // Board
  if(board){ctx.fillStyle='#e94560';ctx.fillRect(-10,25,20,3);ctx.fillStyle='#888';ctx.beginPath();ctx.arc(-7,30,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,30,2.5,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}

// ===== MAIN APP =====
function App(){
  const canvasRef=useRef(null);
  const animRef=useRef(null);
  const frameRef=useRef(0);
  const playerRef=useRef({x:130,y:600,targetX:null,targetY:null});
  const facingRef=useRef('right');
  const movingRef=useRef(false);
  const keysRef=useRef({});
  const gameStateRef=useRef(null);

  // Game state
  const [stats,setStats]=useState({strength:1,intelligence:1,charm:1,karma:0});
  const [hp,setHp]=useState(100);
  const [cash,setCash]=useState(200);
  const [day,setDay]=useState(1);
  const [slots,setSlots]=useState(4);
  const [slept,setSlept]=useState(false);
  const [job,setJob]=useState("panhandler");
  const [inv,setInv]=useState([]);
  const [gameOver,setGameOver]=useState(null);
  const [activeEvent,setActiveEvent]=useState(null);
  const [enteredBuilding,setEnteredBuilding]=useState(null);
  const [nearBuilding,setNearBuilding]=useState(null);
  const [toast,setToast]=useState(null);
  const [wager,setWager]=useState(10);
  const [dayEndPending,setDayEndPending]=useState(false);

  const nearRef=useRef(null);
  const enteredRef=useRef(null);
  useEffect(()=>{nearRef.current=nearBuilding},[nearBuilding]);
  useEffect(()=>{enteredRef.current=enteredBuilding},[enteredBuilding]);

  const hasSkateboard=inv.includes('skateboard');
  const canAct=slots>0&&!gameOver&&!activeEvent&&!dayEndPending;
  const tod=['night','evening','afternoon','midday','morning'][slots]||'morning';

  const showToast=useCallback((msg,type)=>{setToast({msg,type});setTimeout(()=>setToast(null),2200)},[]);

  const addLog=useCallback((msg,type)=>showToast(msg,type),[showToast]);

  const modify=useCallback((changes)=>{
    let logParts=[];
    if(changes.hp){setHp(p=>{const n=Math.max(0,Math.min(100,p+changes.hp));if(n<=0)setGameOver("death");return n});if(changes.hp>0)logParts.push(`+${changes.hp} HP`);else logParts.push(`${changes.hp} HP`)}
    if(changes.cash){setCash(p=>Math.max(0,p+changes.cash));if(changes.cash>0)logParts.push(`+$${changes.cash}`);else logParts.push(`-$${Math.abs(changes.cash)}`)}
    if(changes.strength){setStats(p=>({...p,strength:Math.max(0,p.strength+changes.strength)}));logParts.push(`+${changes.strength} STR`)}
    if(changes.intelligence){setStats(p=>({...p,intelligence:Math.max(0,p.intelligence+changes.intelligence)}));logParts.push(`+${changes.intelligence} INT`)}
    if(changes.charm){setStats(p=>({...p,charm:Math.max(0,p.charm+changes.charm)}));logParts.push(`+${changes.charm} CHM`)}
    if(changes.karma){setStats(p=>({...p,karma:Math.max(-100,Math.min(100,p.karma+changes.karma))}));logParts.push(`${changes.karma>0?'+':''}${changes.karma} K`)}
    if(changes.slotPenalty){setSlots(p=>Math.max(0,p-changes.slotPenalty))}
    return logParts.join(', ');
  },[]);

  const useSlot=useCallback(()=>setSlots(p=>p-1),[]);

  // End day
  const endDay=useCallback(()=>{
    setEnteredBuilding(null);
    setDayEndPending(true);
    let penalty=false;
    setSlept(prev=>{penalty=!prev;return prev});
    setTimeout(()=>{
      if(penalty){setHp(p=>{const n=Math.max(0,p-15);if(n<=0)setGameOver("death");return n});showToast("Didn't sleep. -15 HP.","bad")}
      setDay(prev=>{
        if(prev>=100){setGameOver("day100");return prev}
        return prev+1;
      });
      setSlots(4);
      setSlept(false);
      setDayEndPending(false);
      // Random event
      if(Math.random()<.2){
        setTimeout(()=>{
          let pool=EVENTS;
          setInv(prevInv=>{if(prevInv.includes("alarm_clock"))pool=pool.filter(e=>e.title!=="Overslept");return prevInv});
          setActiveEvent(pool[Math.floor(Math.random()*pool.length)]);
        },100);
      }
    },400);
  },[showToast]);

  // Auto end day
  useEffect(()=>{
    if(slots<=0&&!gameOver&&!activeEvent&&!dayEndPending){const t=setTimeout(endDay,500);return()=>clearTimeout(t)}
  },[slots,gameOver,activeEvent,dayEndPending,endDay]);

  // Event choice
  const handleEventChoice=(c)=>{
    const efx=typeof c.effects==='function'?c.effects(stats):c.effects;
    const msg=typeof c.result==='function'?c.result(efx):c.result;
    const parts=modify(efx);
    showToast(msg,c.type||"event");
    setActiveEvent(null);
  };
  const canChoose=(c)=>{
    if(!c.req)return true;
    for(const[k,v]of Object.entries(c.req)){
      if(k==="strength"||k==="intelligence"||k==="charm"){if(stats[k]<v)return false}
      if(k==="cash"&&cash<v)return false;
      if(k==="karmaBelow"&&stats.karma>=v)return false;
    }return true;
  };

  // Actions
  const sGain=(base,stat)=>stats[stat]>50?Math.max(1,Math.floor(base*.5)):base+Math.floor(Math.random()*3);
  const doSleep=()=>{if(!canAct||slept)return;modify({hp:20});setSlept(true);useSlot();showToast("Slept. +20 HP.","good")};
  const doStudy=()=>{if(!canAct||cash<10)return;const g=sGain(2,"intelligence");modify({intelligence:g,cash:-10});useSlot();showToast(`Studied. +${g} INT. -$10.`,"good")};
  const doWorkout=()=>{if(!canAct)return;const g=sGain(2,"strength");modify({strength:g});useSlot();showToast(`Worked out. +${g} STR.`,"good")};
  const doSpar=()=>{if(!canAct||stats.strength<25)return;if(Math.random()<.5){modify({strength:3});showToast("Sparred & won. +3 STR.","good")}else{modify({strength:1,hp:-10});showToast("Sparred & lost. +1 STR -10 HP.","bad")}useSlot()};
  const doDrink=()=>{if(!canAct||cash<5)return;const g=sGain(1,"charm");modify({hp:-5,cash:-5,charm:g});useSlot();showToast(`Drink. +${g} CHM -5HP -$5.`,"event")};
  const doGamble=()=>{if(!canAct||cash<10)return;const w=Math.min(wager,cash);const wc=Math.min(.7,.4+stats.intelligence*.003);if(Math.random()<wc){modify({cash:w});showToast(`Won $${w*2}!`,"good")}else{modify({cash:-w});showToast(`Lost $${w}.`,"bad")}useSlot()};
  const doTalk=()=>{const a=NPCS.filter(n=>{if(stats.charm<n.reqChm)return false;if(n.reqKarma!==undefined){if(n.reqKarma>0&&stats.karma<n.reqKarma)return false;if(n.reqKarma<0&&stats.karma>n.reqKarma)return false}return true});if(!a.length){showToast("Nobody talks to you.","bad");return}const n=a[Math.floor(Math.random()*a.length)];showToast(`${n.name}: ${n.lines[0]}`,"event")};
  const doWork=()=>{if(!canAct)return;const j=JOBS.find(j=>j.id===job);if(!j)return;const efx={cash:j.pay};if(j.karmaShift)efx.karma=j.karmaShift;modify(efx);useSlot();showToast(`Worked: ${j.name}. +$${j.pay}.`,"good")};
  const switchJob=(id)=>{const j=JOBS.find(j=>j.id===id);if(!j||!canDoJob(j,stats))return;setJob(id);showToast(`Now: ${j.name}.`,"event")};
  const buyItem=(item)=>{if(cash<item.cost)return;if(item.oneTime&&inv.includes(item.id))return;const efx={cash:-item.cost};if(item.effect)for(const[k,v]of Object.entries(item.effect)){efx[k]=(efx[k]||0)+v}modify(efx);if(item.oneTime||!item.consumable)setInv(p=>p.includes(item.id)?p:[...p,item.id]);showToast(`Bought ${item.name}.`,"good")};

  // Keyboard
  useEffect(()=>{
    const d=e=>{keysRef.current[e.key.toLowerCase()]=true;if(e.key==='Escape')setEnteredBuilding(null)};
    const u=e=>{keysRef.current[e.key.toLowerCase()]=false};
    window.addEventListener('keydown',d);window.addEventListener('keyup',u);
    return()=>{window.removeEventListener('keydown',d);window.removeEventListener('keyup',u)};
  },[]);

  // Canvas tap/click
  const handleCanvasInput=useCallback((cx,cy)=>{
    if(enteredRef.current||gameOver||activeEvent||dayEndPending)return;
    const canvas=canvasRef.current;if(!canvas)return;
    const rect=canvas.getBoundingClientRect();
    const sx=W/rect.width,sy=H/rect.height;
    const wx=(cx-rect.left)*sx,wy=(cy-rect.top)*sy;

    // Check door tap
    for(const b of BUILDINGS){
      const d=b.door;
      if(wx>=d.x-15&&wx<=d.x+d.w+15&&wy>=d.y-15&&wy<=d.y+d.h+15){
        // Walk to door then enter
        playerRef.current.targetX=d.x+d.w/2;
        playerRef.current.targetY=d.y+d.h+15;
        playerRef.current.enterOnArrival=b.id;
        return;
      }
    }
    // Walk to point
    playerRef.current.targetX=wx;
    playerRef.current.targetY=wy;
    playerRef.current.enterOnArrival=null;
  },[gameOver,activeEvent,dayEndPending]);

  const onCanvasClick=useCallback(e=>{handleCanvasInput(e.clientX,e.clientY)},[handleCanvasInput]);
  const onCanvasTouch=useCallback(e=>{e.preventDefault();const t=e.changedTouches[0];if(t)handleCanvasInput(t.clientX,t.clientY)},[handleCanvasInput]);

  // Game loop
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');

    const loop=()=>{
      frameRef.current++;
      const p=playerRef.current;
      const keys=keysRef.current;
      const speed=hasSkateboard?4:2.8;
      let moved=false;

      if(!enteredRef.current&&!gameOver&&!activeEvent&&!dayEndPending){
        // Keyboard
        let kbMove=false;
        if(keys.w||keys.arrowup){p.y=Math.max(30,p.y-speed);moved=kbMove=true}
        if(keys.s||keys.arrowdown){p.y=Math.min(H-10,p.y+speed);moved=kbMove=true}
        if(keys.a||keys.arrowleft){p.x=Math.max(15,p.x-speed);facingRef.current='left';moved=kbMove=true}
        if(keys.d||keys.arrowright){p.x=Math.min(W-15,p.x+speed);facingRef.current='right';moved=kbMove=true}
        if(kbMove){p.targetX=null;p.enterOnArrival=null}

        // E to enter
        if(keys.e&&nearRef.current&&!enteredRef.current){
          setEnteredBuilding(nearRef.current);
          keys.e=false;
        }

        // Tap target
        if(p.targetX!=null&&p.targetY!=null){
          const dx=p.targetX-p.x,dy=p.targetY-p.y,dist=Math.hypot(dx,dy);
          if(dist>4){
            p.x+=dx/dist*speed;p.y+=dy/dist*speed;
            if(dx<-.5)facingRef.current='left';if(dx>.5)facingRef.current='right';
            moved=true;
          }else{
            if(p.enterOnArrival){
              setEnteredBuilding(p.enterOnArrival);
              p.enterOnArrival=null;
            }
            p.targetX=null;p.targetY=null;
          }
        }
        movingRef.current=moved;

        // Near check
        let found=null;
        for(const b of BUILDINGS){
          const dx=p.x-(b.door.x+b.door.w/2),dy=p.y-(b.door.y+b.door.h);
          if(Math.hypot(dx,dy)<50){found=b.id;break}
        }
        setNearBuilding(found);
      }

      // Draw
      const cw=canvas.parentElement.clientWidth;
      const ch=canvas.parentElement.clientHeight;
      canvas.width=cw;canvas.height=ch;
      const scale=Math.min(cw/W,ch/H);
      const ox=(cw-W*scale)/2,oy=(ch-H*scale)/2;
      ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);

      const currentTod=['night','evening','afternoon','midday','morning'][slots]||'morning';
      drawWorld(ctx,currentTod,BUILDINGS,p,facingRef.current,frameRef.current,movingRef.current,hasSkateboard,enteredRef.current,nearRef.current);

      // Target indicator
      if(p.targetX!=null&&!enteredRef.current){
        ctx.fillStyle='rgba(78,204,163,.3)';
        ctx.beginPath();ctx.arc(p.targetX,p.targetY,6+Math.sin(frameRef.current*.1)*2,0,Math.PI*2);ctx.fill();
      }

      ctx.restore();
      animRef.current=requestAnimationFrame(loop);
    };
    animRef.current=requestAnimationFrame(loop);
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[hasSkateboard,gameOver,activeEvent,dayEndPending,slots]);

  // Scoring
  const getKarmaLabel=()=>{const k=stats.karma;if(k<=-50)return"Villain";if(k<=-10)return"Shady";if(k<=10)return"Neutral";if(k<=50)return"Decent";return"Saint"};
  const calcScore=()=>{let s=(stats.strength+stats.intelligence+stats.charm)*10+cash+stats.karma*5+day*2;if(inv.includes("penthouse_key"))s+=500;if(inv.includes("skateboard"))s+=50;return s};

  // ===== RENDER =====
  if(gameOver){
    const j=JOBS.find(j=>j.id===job);
    return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',padding:16,background:'#111'}}>
      <div className="modal" style={{maxWidth:400}}><div className="summ">
        <h2>{gameOver==="death"?"You Didn't Make It":"Your Life Story"}</h2>
        <div className="fs">Days: <strong>{day}</strong></div>
        <div className="fs">Cash: <strong style={{color:'#4ecca3'}}>${cash}</strong></div>
        <div className="fs">STR <strong style={{color:'#fc5185'}}>{stats.strength}</strong> INT <strong style={{color:'#6c63ff'}}>{stats.intelligence}</strong> CHM <strong style={{color:'#f9a826'}}>{stats.charm}</strong></div>
        <div className="fs">Karma: <strong style={{color:'#a8e6cf'}}>{stats.karma}</strong></div>
        <div className="al">{getKarmaLabel()}</div>
        <div className="fs">Job: {j?.name}</div>
        <div className="fs">Items: {inv.length?inv.map(id=>ITEMS.find(i=>i.id===id)?.name).join(', '):'None'}</div>
        <div className="sc">Score: {calcScore()}</div>
        <button className="mbtn" onClick={()=>window.location.reload()} style={{textAlign:'center',marginTop:8}}>Play Again</button>
      </div></div>
    </div>);
  }

  const hpColor=hp>60?'#4ecca3':hp>30?'#f9a826':'#e94560';
  const curJob=JOBS.find(j=>j.id===job);

  // Building action sheet
  const renderBSheet=()=>{
    if(!enteredBuilding)return null;
    const b=BUILDINGS.find(b=>b.id===enteredBuilding);
    const close=()=>setEnteredBuilding(null);

    let content=null;
    switch(enteredBuilding){
      case"apartment":content=(<>
        <button className="act-btn" onClick={doSleep} disabled={!canAct||slept}><div className="ab-name">{slept?"Already Slept":"Sleep"}</div><div className="ab-sub">+20 HP | 1 slot</div></button>
        <div style={{padding:'8px 12px',fontSize:'.65em',color:'#555'}}>Items: {inv.length?inv.map(id=><span key={id} style={{background:'#0f3460',padding:'2px 6px',borderRadius:8,margin:2,display:'inline-block'}}>{ITEMS.find(i=>i.id===id)?.name}</span>):'Empty'}</div>
      </>);break;
      case"university":content=(<>
        <button className="act-btn" onClick={doStudy} disabled={!canAct||cash<10}><div className="ab-name">Study</div><div className="ab-sub">+2-4 INT | 1 slot</div><div className="ab-cost">-$10</div>{cash<10&&<div className="ab-req">Broke.</div>}</button>
      </>);break;
      case"gym":content=(<>
        <button className="act-btn" onClick={doWorkout} disabled={!canAct}><div className="ab-name">Work Out</div><div className="ab-sub">+2-4 STR | 1 slot | Free</div></button>
        <button className="act-btn" onClick={doSpar} disabled={!canAct||stats.strength<25}><div className="ab-name">Spar</div><div className="ab-sub">50/50: +3 STR or -10 HP +1 STR</div>{stats.strength<25&&<div className="ab-req">STR 25 req</div>}</button>
      </>);break;
      case"bar":content=(<>
        <button className="act-btn" onClick={doDrink} disabled={!canAct||cash<5}><div className="ab-name">Drink</div><div className="ab-sub">+CHM -5HP | 1 slot</div><div className="ab-cost">-$5</div></button>
        <button className="act-btn" onClick={doGamble} disabled={!canAct||cash<10}><div className="ab-name">Gamble ${Math.min(wager,cash)}</div><div className="ab-sub">Win: {Math.min(70,Math.floor(40+stats.intelligence*.3))}% | 1 slot</div>
          <div className="wager-row">{[10,25,50,100].map(w=><button key={w} className={`wager-btn${wager===w?' active':''}`} onClick={e=>{e.stopPropagation();setWager(w)}}>${w}</button>)}<button className={`wager-btn${wager>=cash?' active':''}`} onClick={e=>{e.stopPropagation();setWager(cash)}}>All</button></div>
        </button>
        <button className="act-btn" onClick={doTalk}><div className="ab-name">Talk to Someone</div><div className="ab-sub">Free (no slot)</div></button>
      </>);break;
      case"workplace":content=(<>
        <button className="act-btn" onClick={doWork} disabled={!canAct}><div className="ab-name">Work: {curJob?.name}</div><div className="ab-sub">{curJob?.desc}</div><div className="ab-cost">+${curJob?.pay}</div></button>
        <div style={{padding:'4px 12px',fontSize:'.65em',color:'#888'}}>Switch job (free):</div>
        {JOBS.map(j=>{const ok=canDoJob(j,stats);const cur=job===j.id;const req=Object.entries(j.req).map(([k,v])=>k==='karmaCap'?`K<=${v}`:k==='karmaFloor'?`K>=${v}`:`${k.slice(0,3).toUpperCase()}${v}`).join(' ')||'-';
          return<div key={j.id} className={`job-row${ok?'':' locked'}${cur?' current':''}`} onClick={()=>ok&&switchJob(j.id)}><span className="jn">{j.name}{cur?' *':''}</span><span className="jr">{req}</span><span className="jp">${j.pay}</span></div>
        })}
      </>);break;
      case"store":content=(<>
        {ITEMS.map(item=>{const owned=item.oneTime&&inv.includes(item.id);const ok=cash>=item.cost&&!owned;
          return<div key={item.id} className={`shop-row${ok?'':' dis'}`} onClick={()=>ok&&buyItem(item)}><div><div className="sn">{item.name}{owned?' (Owned)':''}</div><div className="sd">{item.desc}</div></div><div className="sp">{owned?'--':`$${item.cost}`}</div></div>
        })}
        <div style={{fontSize:'.6em',color:'#444',padding:'6px 12px'}}>Shopping = free action.</div>
      </>);break;
    }

    return(<>
      <div className="bsheet-overlay" onClick={close}/>
      <div className="bsheet">
        <div className="bsheet-handle"/>
        <button className="bsheet-close" onClick={close}>x</button>
        <h3>{b?.label}</h3>
        <div className="bsheet-actions">
          {content}
          {slots>0&&slots<4&&canAct&&<button className="act-btn" onClick={()=>{close();setTimeout(endDay,100)}} style={{background:'transparent',border:'1px solid #f9a826',color:'#f9a826'}}><div className="ab-name">End Day Early</div></button>}
        </div>
      </div>
    </>);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh'}}>
      {/* HUD */}
      <div className="hud">
        <div className="hud-day">DAY {day}</div>
        <div className="hp-wrap">
          <span className="hp-icon">&hearts;</span>
          <div className="hp-bar-out"><div className="hp-bar-in" style={{width:`${hp}%`,background:hpColor}}/><div className="hp-text">{hp}/100</div></div>
        </div>
        <div className="hud-cash">${cash}</div>
        <div className="hud-stat"><span className="hl">S</span><span className="hv hs-str">{stats.strength}</span></div>
        <div className="hud-stat"><span className="hl">I</span><span className="hv hs-int">{stats.intelligence}</span></div>
        <div className="hud-stat"><span className="hl">C</span><span className="hv hs-chm">{stats.charm}</span></div>
        <div className="hud-stat"><span className="hl">K</span><span className="hv hs-k">{stats.karma}</span></div>
        <div className="hud-slots">{[0,1,2,3].map(i=><div key={i} className={`hud-pip ${i<(4-slots)?'u':'f'}`}/>)}</div>
      </div>

      {/* CANVAS */}
      <div className="canvas-wrap">
        <canvas ref={canvasRef} onClick={onCanvasClick} onTouchStart={onCanvasTouch}/>

        {/* Toast */}
        {toast&&<div className={`log-toast ${toast.type}`}>{toast.msg}</div>}

        {/* End day float */}
        {!enteredBuilding&&slots>0&&slots<4&&canAct&&(
          <button className="end-day-float" onClick={endDay}>End Day ({slots} slots left)</button>
        )}

        {/* Building action sheet */}
        {renderBSheet()}
      </div>

      {/* Event modal */}
      {activeEvent&&(
        <div className="modal-overlay"><div className="modal">
          <h2>{activeEvent.title}</h2>
          <p>{activeEvent.desc}</p>
          {activeEvent.choices.map((c,i)=>{
            if(c.blockItem&&inv.includes(c.blockItem))return<div key={i} className="mbtn" style={{opacity:.4,pointerEvents:'none'}}>{c.label}<br/><span style={{color:'#888',fontSize:'.85em'}}>Blocked by {ITEMS.find(it=>it.id===c.blockItem)?.name}</span></div>;
            const ok=canChoose(c);
            return<button key={i} className="mbtn" disabled={!ok} onClick={()=>handleEventChoice(c)}>{c.label}{!ok?' (Locked)':''}</button>
          })}
        </div></div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
